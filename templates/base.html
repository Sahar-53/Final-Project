<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
    {% block title %}<title>Task Management App</title>{% endblock %}
    <!-- This allow for the code to personalised according the individual page-->

</head>

<body>
    <nav class="bg-gray-800 text-white p-4">
    <div class="flex justify-between items-center max-w-6xl mx-auto">

        <!-- Logo / Home -->
        <a href="" class="text-xl font-bold">Task Manager</a>

        <!-- Navigation Links -->
        <div class="space-x-6">

            <a href="/" class="hover:text-gray-300">Home</a>

            {% if current_user.is_authenticated %}
                <a href="/tasks" class="hover:text-gray-300">Dashboard</a>
                <a href="/logout" class="hover:text-gray-300">Logout</a>
            {% else %}
                <a href="/login" class="hover:text-gray-300">Login</a>
                <a href="/register" class="hover:text-gray-300">Register</a>
            {% endif %}

        </div>

    </div>
    </nav>
    <br>
    <br>
    <br>
    <br>

    {% block content %}

    <h1 class="text-3xl font-bold text-center mt-4 mb-8">Task Management App</h1>
    <p>Task Manager App Running</p>

    {% endblock %}

</body>

</html>
